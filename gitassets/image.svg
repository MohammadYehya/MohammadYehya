<svg xmlns="http://www.w3.org/2000/svg" fill="none" width="200" height="40">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .container {
          display: flex;
          align-items: center;
          justify-content: center;
          height: 40px;
          font-family: -apple-system, sans-serif;
        }
        .link-text {
          font-size: 18px;
          font-weight: bold;
          color: #255DF6; /* Initial Blue */
          text-decoration: none;
          transition: color 0.3s ease;
          cursor: pointer;
        }
        /* The Magic: Hover State */
        .link-text:hover {
          color: #FF4500; /* Changes to Orange-Red on hover */
        }
      </style>
      <div class="container">
        <a class="link-text">Hover Over Me! ↗</a>
      </div>
    </div>
  </foreignObject>
</svg>
