<svg fill="none" width="200" height="50" viewBox="0 0 200 50" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .hover-text {
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
          font-size: 20px;
          font-weight: bold;
          color: #24292f;
          cursor: pointer;
          transition: color 0.3s ease;
          user-select: none;
        }

        /* The core test: Hover state */
        .hover-text:hover {
          color: #0969da;
          text-decoration: underline;
        }
      </style>
      <div class="hover-text">Hover over me!</div>
    </div>
  </foreignObject>
</svg>
